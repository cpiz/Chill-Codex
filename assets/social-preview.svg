<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Chill, Codex.</title>
  <desc id="desc">A social preview image for Chill Codex, a tiny macOS launcher that starts Codex with reduced motion.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.52" stop-color="#17313a"/>
      <stop offset="1" stop-color="#2d2a4a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbf8"/>
      <stop offset="1" stop-color="#dcebe4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <g opacity="0.32" stroke="#75e6da" stroke-width="3" fill="none">
    <path d="M82 142 C190 112 252 164 350 130"/>
    <path d="M870 482 C990 448 1062 506 1190 470"/>
    <path d="M760 118 C870 88 930 152 1038 110"/>
  </g>

  <g transform="translate(104 112)" filter="url(#shadow)">
    <rect width="1072" height="416" rx="28" fill="url(#panel)"/>
    <rect x="34" y="34" width="1004" height="348" rx="18" fill="#111827"/>

    <circle cx="70" cy="70" r="9" fill="#ff6b6b"/>
    <circle cx="98" cy="70" r="9" fill="#ffd166"/>
    <circle cx="126" cy="70" r="9" fill="#06d6a0"/>

    <text x="66" y="154" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="74" font-weight="800" letter-spacing="0">
      Chill, Codex.
    </text>
    <text x="70" y="214" fill="#b8f3e6" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="600" letter-spacing="0">
      start Codex with reduced motion
    </text>

    <g transform="translate(70 268)">
      <rect width="780" height="58" rx="12" fill="#0b1220" stroke="#334155"/>
      <text x="24" y="38" fill="#e2e8f0" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="26" letter-spacing="0">
        --force-prefers-reduced-motion
      </text>
    </g>

  </g>

  <text x="104" y="586" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600" letter-spacing="0">
    tiny macOS launcher · no patching · no sudo · no binary replacement
  </text>
</svg>
